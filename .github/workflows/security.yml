name: Security checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend security and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Verify pinned payment assets
        run: npm run security:verify-assets

      - name: Audit all dependencies
        run: npm audit --audit-level=high

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Apply local database migrations
        run: npm run db:migrate:local

      - name: Run store integration tests
        env:
          STORE_TEST_ADMIN_PASSWORD: local-admin-test
        run: |
          npx wrangler pages dev dist --ip 127.0.0.1 --port 8788 \
            --binding ADMIN_PASSWORD=local-admin-test \
            --binding SESSION_SECRET=ci-session-secret-with-at-least-32-characters > /tmp/store-pages.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8788/api/catalog > /dev/null; then
              break
            fi
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:8788/api/catalog > /dev/null || {
            cat /tmp/store-pages.log
            exit 1
          }
          npm run test:store
